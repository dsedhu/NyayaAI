<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#000"/>
  <g transform="translate(8,8)">
    <!-- Pillar -->
    <rect x="22" y="6" width="4" height="30" rx="2" fill="#FFD700"/>
    <!-- Base -->
    <rect x="14" y="36" width="20" height="3.5" rx="1.5" fill="#FFD700"/>
    <rect x="17" y="34" width="14" height="2.5" rx="1.2" fill="#FFD700"/>
    <!-- Top crown -->
    <circle cx="24" cy="4.5" r="3" fill="#FFD700"/>
    <circle cx="24" cy="4.5" r="1.5" fill="#000"/>
    <!-- Beam -->
    <rect x="4" y="10" width="40" height="2.5" rx="1.2" fill="#FFD700"/>
    <!-- Left chains -->
    <line x1="8" y1="12.5" x2="6" y2="22" stroke="#FFD700" stroke-width="1.3"/>
    <line x1="16" y1="12.5" x2="14" y2="22" stroke="#FFD700" stroke-width="1.3"/>
    <!-- Left pan -->
    <path d="M3 22 Q10 29 17 22 Z" fill="#FFD700" opacity="0.85"/>
    <ellipse cx="10" cy="22" rx="7" ry="1" fill="#FFD700"/>
    <!-- Right chains -->
    <line x1="32" y1="12.5" x2="34" y2="22" stroke="#FFD700" stroke-width="1.3"/>
    <line x1="40" y1="12.5" x2="42" y2="22" stroke="#FFD700" stroke-width="1.3"/>
    <!-- Right pan -->
    <path d="M31 22 Q38 29 45 22 Z" fill="#FFD700" opacity="0.85"/>
    <ellipse cx="38" cy="22" rx="7" ry="1" fill="#FFD700"/>
  </g>
</svg>
